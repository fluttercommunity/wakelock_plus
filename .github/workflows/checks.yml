name: checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**/lib/**'
      - '**/android/**'
      - '**/ios/**'
      - '**/pubspec.yaml'
      - '**/test/**'
      - '**/test_driver/**'
      - '**/assets/**'
      - '**/integration_test/**'
      - '.github/workflows/checks.yml'

env:
  # The version of Flutter to use should use the minimum Dart SDK version supported by the package.
  # Current minimum (N-1 logic)
  FLUTTER_VERSION_MINIMUM_DEFAULT: "3.38.10"
  # Latest 3.x stable
  FLUTTER_VERSION_LATEST_STABLE_CHANNEL_DEFAULT: "3.x"
  # Beta channel support
  FLUTTER_VERSION_BETA_CHANNEL_DEFAULT: "beta"

jobs:
  setup_matrix:
    name: Determine Flutter Test Versions
    runs-on: ubuntu-latest
    outputs:
      flutter_versions_json: ${{ steps.set_versions.outputs.versions_json }}
    steps:
      - name: Determine Flutter versions
        id: set_versions
        run: |
          MIN="${{ env.FLUTTER_VERSION_MINIMUM_DEFAULT }}"
          STABLE="${{ env.FLUTTER_VERSION_LATEST_STABLE_CHANNEL_DEFAULT }}"
          BETA="${{ env.FLUTTER_VERSION_BETA_CHANNEL_DEFAULT }}"
          
          # Create JSON array: ["3.38.10", "3.x", "beta"]
          VERSIONS_JSON=$(jq -c --null-input '$ARGS.positional' --args "$MIN" "$STABLE" "$BETA")
          echo "versions_json=$VERSIONS_JSON" >> $GITHUB_OUTPUT

  analyze:
    needs: setup_matrix
    timeout-minutes: 15
    runs-on: ubuntu-latest
    name: ${{ matrix.package }} analysis on ${{ matrix.flutter_version }}
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
        package: [wakelock_plus, wakelock_plus_platform_interface]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          # Logic: If version contains a dot or 'x', it's a version/3.x. Otherwise (beta), it's a channel.
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}

      - name: Install dependencies
        run: flutter pub get --no-example
        working-directory: ${{ matrix.package }}

      - name: Check format
        # Ensure CI fails if code isn't formatted according to dart style
        run: dart format . --set-exit-if-changed
        working-directory: ${{ matrix.package }}
        # Only continue on error if this is the job for the MINIMUM Flutter version or beta channel.
        # This allows formatting issues to be warnings on older supported versions
        # but enforces them on the latest stable or primary development version.
        continue-on-error: ${{ matrix.flutter_version == env.FLUTTER_VERSION_MINIMUM_DEFAULT || matrix.flutter_version == env.FLUTTER_VERSION_BETA_CHANNEL_DEFAULT }}

      - name: Analyze
        run: flutter analyze
        working-directory: ${{ matrix.package }}

  unit_tests:
    needs: setup_matrix
    runs-on: ubuntu-latest
    name: ${{ matrix.package }} unit tests on ${{ matrix.flutter_version }}
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
        package: [wakelock_plus, wakelock_plus_platform_interface]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}

      - name: Install dependencies
        run: flutter pub get --no-example
        working-directory: ${{ matrix.package }}

      - name: Run unit tests
        run: flutter test
        working-directory: ${{ matrix.package }}

  # --- ANDROID JOBS ---

  android_example_build:
    needs: setup_matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
      - name: Build Android APK
        run: |
          cd wakelock_plus/example
          flutter pub get
          flutter build apk --debug --target=./lib/main.dart

  android_integration_test:
    needs: setup_matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        api-level: [24, 28, 31, 33, 35]
      fail-fast: false
    name: Android Integration (API ${{ matrix.api-level }})
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Integration tests run on stable to reduce emulator flakes

      - name: Enable KVM
        # Hardware acceleration is required for Android emulators in CI
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Integration Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: wakelock_plus/example
          # One-line script to prevent backslash-parsing errors in the emulator-runner
          script: flutter drive --driver=test_driver/integration_test.dart --target=integration_test/wakelock_plus_test.dart

  # --- IOS JOBS ---

  ios_example_build:
    needs: setup_matrix
    runs-on: macos-latest
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
      - name: Build iOS
        run: |
          cd wakelock_plus/example
          flutter pub get
          flutter build ios --no-codesign --debug --target=./lib/main.dart

  ios_integration_test:
    needs: setup_matrix
    runs-on: macos-26 # Required for iPhone 17 / iOS 18 support
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Start iOS simulator
        uses: futureware-tech/simulator-action@v5
        with:
          model: 'iPhone 17'

      - name: Run Integration Tests
        run: |
          cd wakelock_plus/example
          flutter pub get
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/wakelock_plus_test.dart

  # --- MACOS JOBS ---

  macos_example_build:
    needs: setup_matrix
    runs-on: macos-latest
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
      - name: Build macOS
        run: |
          flutter config --enable-macos-desktop
          cd wakelock_plus/example
          flutter pub get
          flutter build macos --debug --target=./lib/main.dart

  macos_integration_test:
    needs: setup_matrix
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Integration Tests
        run: |
          flutter config --enable-macos-desktop
          cd wakelock_plus/example
          flutter pub get
          flutter drive \
            -d macos \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/wakelock_plus_test.dart

  # --- LINUX JOBS ---

  linux_example_build:
    needs: setup_matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Build Linux
        run: |
          flutter config --enable-linux-desktop
          cd wakelock_plus/example
          flutter pub get
          flutter build linux --debug --target=./lib/main.dart

  linux_integration_test:
    needs: setup_matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter_version: [ stable ]
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev xvfb dbus-x11 \
            python3-dbus python3-gi

      - name: Run Integration Tests
        run: |
          flutter config --enable-linux-desktop
          cd wakelock_plus/example
          flutter pub get

          # We use xvfb-run and dbus-run-session.
          # Inside the session, we start a tiny Python background process that 
          # mocks the 'org.freedesktop.ScreenSaver' service so the plugin has 
          # a valid target to talk to.
          xvfb-run dbus-run-session bash -c "
          python3 -c \"
          import dbus, dbus.service
          from dbus.mainloop.glib import DBusGMainLoop
          from gi.repository import GLib
          class Mock(dbus.service.Object):
              def __init__(self):
                  bus_name = dbus.service.BusName('org.freedesktop.ScreenSaver', bus=dbus.SessionBus())
                  dbus.service.Object.__init__(self, bus_name, '/org/freedesktop/ScreenSaver')
              @dbus.service.method('org.freedesktop.ScreenSaver', in_signature='ss', out_signature='u')
              def Inhibit(self, a, r): return 1
              @dbus.service.method('org.freedesktop.ScreenSaver', in_signature='u', out_signature='')
              def UnInhibit(self, c): pass
          DBusGMainLoop(set_as_default=True)
          Mock()
          GLib.MainLoop().run()\" & 
          sleep 2 && \
          flutter drive \
            -d linux \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/wakelock_plus_test.dart"

  # --- WINDOWS JOBS ---

  windows_example_build:
    needs: setup_matrix
    runs-on: windows-latest
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
      - name: Build Windows
        run: |
          flutter config --enable-windows-desktop
          cd wakelock_plus/example
          flutter pub get
          flutter build windows --debug --target=./lib/main.dart

  windows_integration_test:
    needs: setup_matrix
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Integration Tests
        # Use single line to prevent PowerShell parsing errors with backslashes
        run: |
          flutter config --enable-windows-desktop
          cd wakelock_plus/example
          flutter pub get
          flutter drive -d windows --driver=test_driver/integration_test.dart --target=integration_test/wakelock_plus_test.dart

  # --- WEB JOBS ---

  web_example_build:
    needs: setup_matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter_version: ${{ fromJson(needs.setup_matrix.outputs.flutter_versions_json) }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ (contains(matrix.flutter_version, '.') || contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
          channel: ${{ (!contains(matrix.flutter_version, '.') && !contains(matrix.flutter_version, 'x')) && matrix.flutter_version || '' }}
      - name: Build Web
        run: |
          cd wakelock_plus/example
          flutter pub get
          flutter build web --debug --target=./lib/main.dart

  web_integration_test:
    needs: setup_matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Web Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb chromium-chromedriver

      - name: Run Integration Tests
        run: |
          export DISPLAY=:99
          Xvfb $DISPLAY -screen 0 1024x768x16 &
          sleep 5 
          
          chromedriver --port=4444 &
          sleep 2 
          
          flutter config --enable-web
          cd wakelock_plus/example
          flutter pub get
          
          # Use --no-keep-app-running to ensure the process exits cleanly after tests pass
          flutter drive \
            -d chrome \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/wakelock_plus_test.dart \
            --dart-define=CI=true \
            --no-keep-app-running